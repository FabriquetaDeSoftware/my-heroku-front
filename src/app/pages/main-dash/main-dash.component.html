<app-side-bar></app-side-bar>
<div class="flex min-h-screen bg-gray-700">
  <div class="flex-1 p-6 ml-64">
    <div
      class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6"
    >
      @for (item of cards; track item.id) {
      <div
        class="max-w-sm w-full rounded-lg overflow-hidden shadow-xl bg-white p-6 border border-gray-200"
      >
        <h2 class="text-2xl font-semibold text-gray-800 mb-4">
          {{ item.title }}
        </h2>
        <div class="text-sm space-y-3 text-gray-600">
          <p>
            <span class="font-medium text-gray-800">ID:</span> {{ item.id }}
          </p>
          <p>
            <span class="font-medium text-gray-800">CPU Usage:</span>
            {{ item.cpuUsage }}
          </p>
          <p>
            <span class="font-medium text-gray-800">Memory Usage:</span>
            {{ item.memoryUsage }}
          </p>
          <p>
            <span class="font-medium text-gray-800">Memory Percent:</span>
            {{ item.memoryPercent }}
          </p>
        </div>
      </div>
      }
    </div>
  </div>
</div>
