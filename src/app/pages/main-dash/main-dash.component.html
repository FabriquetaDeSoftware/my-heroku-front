<app-side-bar></app-side-bar>
<div
  class="flex min-h-screen bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900"
>
  <div class="flex-1 ml-64 relative">
    <div
      class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6 p-6"
    >
      <div class="w-full flex justify-between gap-6 col-span-5">
        <div
          class="grow rounded-lg overflow-hidden shadow-xl bg-[#1A1A1A] p-6 border border-gray-200"
        >
          <div class="flex text-white items-center gap-2 justify-between">
            <h2 class="text-2xl font-semibold mb-2">CPU</h2>
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="lucide lucide-cpu-icon lucide-cpu"
            >
              <path d="M12 20v2" />
              <path d="M12 2v2" />
              <path d="M17 20v2" />
              <path d="M17 2v2" />
              <path d="M2 12h2" />
              <path d="M2 17h2" />
              <path d="M2 7h2" />
              <path d="M20 12h2" />
              <path d="M20 17h2" />
              <path d="M20 7h2" />
              <path d="M7 20v2" />
              <path d="M7 2v2" />
              <rect x="4" y="4" width="16" height="16" rx="2" />
              <rect x="8" y="8" width="8" height="8" rx="1" />
            </svg>
          </div>
        </div>

        <div
          class="grow rounded-lg overflow-hidden shadow-xl bg-[#1A1A1A] p-6 border border-gray-200"
        >
          <div class="flex text-white items-center gap-2 justify-between">
            <h2 class="text-2xl font-semibold mb-2">Memória</h2>
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="lucide lucide-memory-stick-icon lucide-memory-stick"
            >
              <path d="M6 19v-3" />
              <path d="M10 19v-3" />
              <path d="M14 19v-3" />
              <path d="M18 19v-3" />
              <path d="M8 11V9" />
              <path d="M16 11V9" />
              <path d="M12 11V9" />
              <path d="M2 15h20" />
              <path
                d="M2 7a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v1.1a2 2 0 0 0 0 3.837V17a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2v-5.1a2 2 0 0 0 0-3.837Z"
              />
            </svg>
          </div>
        </div>

        <div
          class="grow rounded-lg overflow-hidden shadow-xl bg-[#1A1A1A] p-6 border border-gray-200"
        >
          <div class="flex text-white items-center gap-2 justify-between">
            <h2 class="text-2xl font-semibold mb-2">Disco</h2>
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="lucide lucide-hard-drive-icon lucide-hard-drive"
            >
              <line x1="22" x2="2" y1="12" y2="12" />
              <path
                d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"
              />
              <line x1="6" x2="6.01" y1="16" y2="16" />
              <line x1="10" x2="10.01" y1="16" y2="16" />
            </svg>
          </div>
        </div>

        <div
          class="grow rounded-lg overflow-hidden shadow-xl bg-[#1A1A1A] p-6 border border-gray-200"
        >
          <div class="flex text-white items-center gap-2 justify-between">
            <h2 class="text-2xl font-semibold mb-2">Uptime</h2>
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="lucide lucide-activity-icon lucide-activity"
            >
              <path
                d="M22 12h-2.48a2 2 0 0 0-1.93 1.46l-2.35 8.36a.25.25 0 0 1-.48 0L9.24 2.18a.25.25 0 0 0-.48 0l-2.35 8.36A2 2 0 0 1 4.49 12H2"
              />
            </svg>
          </div>
        </div>
      </div>

      @for (item of cards; track item.id) {
      <!-- Renderização de Cards -->
      <div
        class="max-w-sm w-full rounded-lg overflow-hidden shadow-xl bg-[#1A1A1A] p-6 border border-gray-200"
      >
        <div class="flex text-white items-center gap-2">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
            class="size-6"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="m21 7.5-9-5.25L3 7.5m18 0-9 5.25m9-5.25v9l-9 5.25M3 7.5l9 5.25M3 7.5v9l9 5.25m0-9v9"
            />
          </svg>
          <h2 class="text-2xl font-semibold mb-2">
            {{ item.title }}
          </h2>
        </div>
        <div class="text-sm space-y-3 text-gray-100">
          <p>
            <span class="font-medium text-gray-200">ID:</span> {{ item.id }}
          </p>
          <p>
            <span class="font-medium text-gray-200">CPU Usage:</span>
            {{ item.cpuUsage }}
          </p>
          <p>
            <span class="font-medium text-gray-200">Memory Usage:</span>
            {{ item.memoryUsage }}
          </p>
          <p>
            <span class="font-medium text-gray-200">Memory Percent:</span>
            {{ item.memoryPercent }}
          </p>
        </div>
        <div class="mt-4 flex justify-center items-center gap-2">
          <!-- Botão de Parar -->
          <button
            class="bg-red-700 hover:bg-red-800 text-white font-semibold py-2 px-4 rounded focus:outline-none focus:ring-2 focus:ring-red-600 focus:ring-opacity-50 grow flex justify-center items-center cursor-pointer"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
              class="w-5 h-5"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M5.25 7.5A2.25 2.25 0 0 1 7.5 5.25h9a2.25 2.25 0 0 1 2.25 2.25v9a2.25 2.25 0 0 1-2.25 2.25h-9a2.25 2.25 0 0 1-2.25-2.25v-9Z"
              />
            </svg>
          </button>

          <!-- Botão de Pausar -->
          <button
            class="bg-yellow-600 hover:bg-yellow-700 text-white font-semibold py-2 px-4 rounded focus:outline-none focus:ring-2 focus:ring-yellow-500 focus:ring-opacity-50 grow flex justify-center items-center cursor-pointer"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
              class="w-5 h-5"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M5.25 5.653c0-.856.917-1.398 1.667-.986l11.54 6.347a1.125 1.125 0 0 1 0 1.972l-11.54 6.347a1.125 1.125 0 0 1-1.667-.986V5.653Z"
              />
            </svg>
          </button>

          <!-- Botão de Ver Logs -->
          <button
            class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-opacity-50 grow flex justify-center items-center cursor-pointer"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
              class="w-5 h-5"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m5.231 13.481L15 17.25m-4.5-15H5.625c-.621 0-1.125.504-1.125 1.125v16.5c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Zm3.75 11.625a2.625 2.625 0 1 1-5.25 0 2.625 2.625 0 0 1 5.25 0Z"
              />
            </svg>
          </button>
        </div>
      </div>
      }
    </div>
  </div>
</div>
