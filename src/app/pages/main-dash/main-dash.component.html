<app-side-bar></app-side-bar>
<div
  class="flex min-h-screen bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900"
>
  <div class="flex-1 p-6 ml-64">
    <div
      class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6"
    >
      @for (item of cards; track item.id) {
      <!-- Renderização de Cards -->
      <div
        class="max-w-sm w-full rounded-lg overflow-hidden shadow-xl bg-[#1A1A1A] p-6 border border-gray-200 transform hover:scale-105 transition-all duration-100 ease-in-out"
      >
        <h2
          class="text-2xl font-semibold text-white mb-4 flex items-center space-x-2"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
            class="size-6"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="m21 7.5-9-5.25L3 7.5m18 0-9 5.25m9-5.25v9l-9 5.25M3 7.5l9 5.25M3 7.5v9l9 5.25m0-9v9"
            />
          </svg>
          <span>{{ item.title }}</span>
        </h2>
        <div class="text-sm space-y-3 text-gray-100">
          <p>
            <span class="font-medium text-gray-200">ID:</span> {{ item.id }}
          </p>
          <p>
            <span class="font-medium text-gray-200">CPU Usage:</span>
            {{ item.cpuUsage }}
          </p>
          <p>
            <span class="font-medium text-gray-200">Memory Usage:</span>
            {{ item.memoryUsage }}
          </p>
          <p>
            <span class="font-medium text-gray-200">Memory Percent:</span>
            {{ item.memoryPercent }}
          </p>
        </div>
        <div class="mt-4 flex justify-center items-center gap-2">
          <!-- Botão de Parar -->
          <button
            class="bg-red-700 hover:bg-red-800 text-white font-semibold py-2 px-4 rounded focus:outline-none focus:ring-2 focus:ring-red-600 focus:ring-opacity-50 grow flex justify-center items-center hover:scale-110 transition-all duration-100 ease-in-out cursor-pointer"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
              class="w-5 h-5"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M5.25 7.5A2.25 2.25 0 0 1 7.5 5.25h9a2.25 2.25 0 0 1 2.25 2.25v9a2.25 2.25 0 0 1-2.25 2.25h-9a2.25 2.25 0 0 1-2.25-2.25v-9Z"
              />
            </svg>
          </button>

          <!-- Botão de Pausar -->
          <button
            class="bg-yellow-600 hover:bg-yellow-700 text-white font-semibold py-2 px-4 rounded focus:outline-none focus:ring-2 focus:ring-yellow-500 focus:ring-opacity-50 grow flex justify-center items-center hover:scale-110 transition-all duration-100 ease-in-out cursor-pointer"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
              class="w-5 h-5"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M5.25 5.653c0-.856.917-1.398 1.667-.986l11.54 6.347a1.125 1.125 0 0 1 0 1.972l-11.54 6.347a1.125 1.125 0 0 1-1.667-.986V5.653Z"
              />
            </svg>
          </button>

          <!-- Botão de Ver Logs -->
          <button
            class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-opacity-50 grow flex justify-center items-center hover:scale-110 transition-all duration-100 ease-in-out cursor-pointer"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
              class="w-5 h-5"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m5.231 13.481L15 17.25m-4.5-15H5.625c-.621 0-1.125.504-1.125 1.125v16.5c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Zm3.75 11.625a2.625 2.625 0 1 1-5.25 0 2.625 2.625 0 0 1 5.25 0Z"
              />
            </svg>
          </button>
        </div>
      </div>
      }
    </div>
  </div>
</div>
